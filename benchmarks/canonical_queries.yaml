# BrainCore Canonical Query Set
# 12 queries probing the 3 sample-vault incidents (INC-001, INC-002, INC-003).
# Each incident gets 4 queries, each probing a different aspect:
#   - cause       (root cause of the incident)
#   - timeline    (when and how it unfolded)
#   - resolution  (how it was fixed)
#   - blast_radius (impact on devices/services/users)
#
# Used by benchmarks/run_retrieval.py to measure retrieval quality
# (relevance_at_10) and latency. `expected_top_k` lists the object
# classes and title substrings that SHOULD appear in the top-k results
# for the query to count as a hit. A query "hits" when at least one
# entry in `expected_top_k` is matched by a top-10 result under
# `object_type` + case-insensitive `title_contains` substring check.
# There is no score-based threshold — the runner uses the RRF-fused
# top-10 as-is.
#
# Source of truth: examples/sample-vault/incidents/INC-00{1,2,3}/notes.md
# Generated: 2026-04-09

# ---------------------------------------------------------------------------
# INC-001: Docker daemon disk space exhaustion (server-a, docker, P2)
# ---------------------------------------------------------------------------
- id: q01
  query: "what caused the docker daemon to run out of disk space on server-a"
  expected_top_k:
    - object_type: fact
      title_contains: "docker"
    - object_type: memory
      title_contains: "disk"

- id: q02
  query: "when did the server-a docker disk incident start and close"
  expected_top_k:
    - object_type: episode
      title_contains: "INC-001"
    - object_type: fact
      title_contains: "disk"

- id: q03
  query: "how did we remediate the unrotated docker container logs issue"
  expected_top_k:
    - object_type: fact
      title_contains: "log rotation"
    - object_type: memory
      title_contains: "docker"

- id: q04
  query: "which devices and services were impacted by the docker disk space exhaustion"
  expected_top_k:
    - object_type: entity
      title_contains: "server-a"
    - object_type: entity
      title_contains: "docker"

# ---------------------------------------------------------------------------
# INC-002: PostgreSQL replication lag (server-a + server-b, postgresql, P1)
# ---------------------------------------------------------------------------
- id: q05
  query: "what was the root cause of the postgresql replication lag incident"
  expected_top_k:
    - object_type: fact
      title_contains: "replication"
    - object_type: memory
      title_contains: "WAL"

- id: q06
  query: "timeline of the postgresql replication lag event on server-b"
  expected_top_k:
    - object_type: episode
      title_contains: "INC-002"
    - object_type: fact
      title_contains: "replication"

- id: q07
  query: "how did we fix the long-running analytical query blocking WAL replay"
  expected_top_k:
    - object_type: fact
      title_contains: "max_standby_streaming_delay"
    - object_type: memory
      title_contains: "replication"

- id: q08
  query: "which services were affected by the postgresql replication incident"
  expected_top_k:
    - object_type: entity
      title_contains: "postgresql"
    - object_type: entity
      title_contains: "server-b"

# ---------------------------------------------------------------------------
