# BrainCore claims-to-evidence — launch audit file
#
# Every numeric or factual claim in the launch README.md MUST have a row
# here binding it to a source file or benchmark JSON. The CI merge gate
# verify_claims_to_evidence.py:
#   1. Loads each YAML row and resolves its declared source value.
#      For source_type=json, the value is read from the JSON file at
#      the dotted json_path. For sql_query, the YAML's `expected` field
#      is the source of truth (no live DB at gate time — migration
#      tests validate the count empirically). For
#      file_lines, the resolved value is the count of files matching
#      the glob. For literal (string), the README is checked for an
#      exact substring match. For literal (numeric), expected is bound
#      via the claim binder like sql_query. For file_contains, the
#      needle must appear in the source file.
#   2. For rows with a registered ClaimBinder (see CLAIM_BINDERS in
#      verify_claims_to_evidence.py), scans README.md with the binder's
#      claim-specific regex. If the README cites the claim, the captured
#      number must match the resolved source value within tolerance.
#      This binding now applies to json, sql_query, file_lines, and
#      numeric literal rows uniformly — no more "documentation-only"
#      numeric rows.
#   3. Surface-checks: any README numeric claim whose unit is not
#      covered by an active claim-binder fails as a "dangling number".
#   4. broken:true rows are SKIPPED unless the README cites them via a
#      claim-specific binder, in which case they fail HARD.
#   5. Framing-anchor isolation: production-corpus rows REQUIRE a
#      production/deployment/live anchor word within ~120 chars of the
#      README citation. Smoke-regression rows have no anchor
#      requirement. This closes the smoke-vs-production false-positive
#      class — a smoke "9 facts" mention cannot accidentally trigger a
#      production "26,966 facts" row.
#
# Fields per entry:
#   claim:     human-readable claim label (used as the dict key into
#              CLAIM_BINDERS in verify_claims_to_evidence.py — does NOT
#              need to appear verbatim in README; the binder regex is
#              the actual README contract)
#   source:    path to source file, relative to repo root
#   source_type: "json" | "sql_query" | "file_contains" | "file_lines" |
#                "literal"
#                - json: read value from source JSON at json_path
#                - sql_query: documentation row; expected is the truth
#                  source for README binding (no live DB at gate time)
#                - file_contains: source file must contain `needle`
#                - file_lines: count files matching `glob` under source
#                - literal: if expected is a string, README must contain
#                  it verbatim; if expected is numeric, bind via claim
#                  binder like sql_query
#   json_path: dotted path into source JSON (only for source_type=json)
#   expected:  expected value (string, int, or float). null = "whatever
#              the source currently has"; pair with a non-null tolerance
#              when README values must agree
#   tolerance: allowed absolute delta for numeric comparisons (optional)
#   framing:   "smoke-regression" | "production-corpus"
#              smoke-regression = bound to benchmarks/seed_smoke.sql, a
#                synthetic fixture tuned to the canonical query set. Use
#                for pipeline regression gating; do NOT cite the value as
#                a representative performance claim.
#              production-corpus = bound to a benchmark run against a
#                naturally-populated BrainCore deployment, committed as
#                benchmarks/results/2026-04-09-retrieval-production.json
#                and benchmarks/results/2026-04-09-grounding-production.json.
#                These rows back live-deployment README claims such as
#                corpus size, latency, and evidence coverage.
#   broken:    true when the row's current binding is intentionally
#              disabled until the corresponding production artifact is
#              available (see framing).
#
# Generated: 2026-04-09
# Framing field added 2026-04-09
# Curated subset of incident claims — only claims that appear in the
# launch README.

- claim: "14-table preserve schema"
  source: "pg_tables"
  source_type: "sql_query"
  query: "SELECT count(*) FROM pg_tables WHERE schemaname='preserve'"
  expected: 14
  tolerance: 0
  framing: "smoke-regression"
  notes: >
    Count is 14 after the full 001-008 migration set. This row backs
    the launch README's schema-count claim for a fresh clone of the
    open-source repo. It is a source-tree invariant, not a live-
    production measurement, so it intentionally does NOT require a
    production anchor word.

