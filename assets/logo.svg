<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280" role="img" aria-labelledby="braincore-logo-title braincore-logo-desc">
  <title id="braincore-logo-title">BrainCore logo</title>
  <desc id="braincore-logo-desc">An observatory dome enclosed by a circular plate, with a four-axis cross radiating outward to mark the four retrieval streams.</desc>

  <!-- Rounded square plate background (favicons stay sharp at 16 px) -->
  <rect x="0" y="0" width="280" height="280" rx="32" ry="32" fill="#0f172a"/>

  <!-- Outer aperture ring: the photographic plate -->
  <circle cx="140" cy="140" r="120" fill="none" stroke="#336791" stroke-width="10"/>

  <!-- Four-axis fix: thick accent arms reaching from edge to edge -->
  <g stroke="#336791" stroke-width="14" stroke-linecap="butt">
    <line x1="20" y1="140" x2="60" y2="140"/>
    <line x1="220" y1="140" x2="260" y2="140"/>
    <line x1="140" y1="20" x2="140" y2="60"/>
    <line x1="140" y1="220" x2="140" y2="260"/>
  </g>

  <!-- Inner dome enclosure -->
  <circle cx="140" cy="140" r="92" fill="#0f172a" stroke="#e2e8f0" stroke-width="6"/>

  <!-- Observatory dome group -->
  <g>
    <!-- Dome base / building shoulders -->
    <rect x="68" y="170" width="144" height="26" fill="#e2e8f0"/>
    <!-- Dome hemisphere -->
    <path d="M 68 170 A 72 72 0 0 1 212 170 Z" fill="#e2e8f0"/>
    <!-- Open shutter slit aimed at zenith -->
    <path d="M 132 100 L 148 100 L 145 170 L 135 170 Z" fill="#0f172a"/>
  </g>

  <!-- Convergence node: center pixel where four streams align -->
  <circle cx="140" cy="140" r="11" fill="#336791" stroke="#e2e8f0" stroke-width="3"/>
</svg>
