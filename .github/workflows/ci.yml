name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-ts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Node dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

  test-ts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Node dependencies
        run: bun install --frozen-lockfile

      - name: Run Bun tests
        run: bun test

  lint-py:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run Ruff
        run: ruff check mcp/ examples/mcp_server/ scripts/ tests/

  test-py:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PYTHONPATH: ${{ github.workspace }}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compose test DSN
        run: |
          echo "BRAINCORE_TEST_DSN=postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install Node dependencies
        run: bun install --frozen-lockfile

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml psycopg[binary] psycopg-pool numpy requests pgvector "mcp[cli]>=1.0"

      - name: Run migrations
        run: bun src/cli.ts migrate

      - name: Verify preserve schema shape
        run: |
          psql "$BRAINCORE_TEST_DSN" \
            -c "SELECT count(*) FROM pg_tables WHERE schemaname='preserve';"

      - name: Verify eval tables exist
        run: |
          psql "$BRAINCORE_TEST_DSN" -c "SELECT 1 FROM preserve.eval_run LIMIT 0;"
          psql "$BRAINCORE_TEST_DSN" -c "SELECT 1 FROM preserve.eval_case LIMIT 0;"

      - name: Verify example MCP import
        run: python -c "from examples.mcp_server.server import app; print(app.name)"

      - name: Run pytest
        run: python -m pytest tests/

      - name: Run Bun smoke tests
        run: bun test

      - name: Run benchmark smoke
        run: |
          python benchmarks/run_retrieval.py
          python benchmarks/run_grounding.py

      - name: Verify tool index
        run: python benchmarks/verify_tool_index.py --tool-index .agents/TOOL_INDEX.yaml

      - name: Verify claims manifest
        run: python benchmarks/verify_claims_to_evidence.py --readme README.md --claims benchmarks/claims-to-evidence.yaml

      - name: Run sanitization gate
        run: bash scripts/pre-push-gate.sh
