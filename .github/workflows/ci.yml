name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-ts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.8"

      - name: Install Node dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run lint

  test-ts:
    runs-on: ubuntu-latest
    env:
      BRAINCORE_TENANT: test-tenant
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.8"

      - name: Install Node dependencies
        run: bun install --frozen-lockfile

      - name: Run Bun tests
        run: bun test

  lint-py:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run Ruff
        run: ruff check mcp/ examples/mcp_server/ scripts/ tests/

  test-py:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PYTHONPATH: ${{ github.workspace }}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
      BRAINCORE_TENANT: test-tenant
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Compose test DSN
        run: |
          DSN="postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB"
          echo "BRAINCORE_TEST_DSN=$DSN" >> "$GITHUB_ENV"
          echo "BRAINCORE_POSTGRES_DSN=$DSN" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.8"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install Node dependencies
        run: bun install --frozen-lockfile

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml psycopg[binary] psycopg-pool numpy requests pgvector "mcp[cli]>=1.0"

      - name: Run migrations
        run: bun src/cli.ts migrate

      - name: Verify preserve schema shape
        run: |
          psql "$BRAINCORE_TEST_DSN" \
            -c "SELECT count(*) FROM pg_tables WHERE schemaname='preserve';"

      - name: Verify eval tables exist
        run: |
          psql "$BRAINCORE_TEST_DSN" -c "SELECT 1 FROM preserve.eval_run LIMIT 0;"
          psql "$BRAINCORE_TEST_DSN" -c "SELECT 1 FROM preserve.eval_case LIMIT 0;"

      - name: Verify example MCP import
        run: python -c "from examples.mcp_server.server import app; print(app.name)"

      - name: Run pytest
        run: python -m pytest tests/

      - name: Run Bun smoke tests
        run: bun test

      - name: Verify tool index
        run: python benchmarks/verify_tool_index.py --tool-index .agents/TOOL_INDEX.yaml

      - name: Verify claims manifest
        run: python benchmarks/verify_claims_to_evidence.py --readme README.md --claims benchmarks/claims-to-evidence.yaml

      - name: Run sanitization gate
        run: bash scripts/pre-push-gate.sh

      - name: Run benchmark smoke
        env:
          BRAINCORE_TENANT: default
        run: |
          python benchmarks/run_retrieval.py
          python benchmarks/run_grounding.py
          python benchmarks/run_ops_memory_bench.py
