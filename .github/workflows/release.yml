name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PYTHONPATH: ${{ github.workspace }}
      BRAINCORE_TENANT: test-tenant
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.8"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml psycopg[binary] psycopg-pool numpy requests pgvector "mcp[cli]>=1.0"

      - name: Compose release DSN
        run: |
          DSN="postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB"
          echo "BRAINCORE_TEST_DSN=$DSN" >> "$GITHUB_ENV"
          echo "BRAINCORE_POSTGRES_DSN=$DSN" >> "$GITHUB_ENV"

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Verify package version
        run: test "$(node -p "require('./package.json').version")" = "${GITHUB_REF_NAME#v}"

      - name: Verify tag target
        run: |
          test "$(git rev-parse "$GITHUB_REF_NAME^{commit}")" = "$GITHUB_SHA"

      - name: Run launch checks
        run: |
          bun src/cli.ts migrate
          bun test
          python -m pytest tests/
          python benchmarks/verify_tool_index.py --tool-index .agents/TOOL_INDEX.yaml
          python benchmarks/verify_claims_to_evidence.py --readme README.md --claims benchmarks/claims-to-evidence.yaml
          bash scripts/pre-push-gate.sh
          BRAINCORE_TENANT=default python benchmarks/run_retrieval.py
          BRAINCORE_TENANT=default python benchmarks/run_grounding.py
          BRAINCORE_TENANT=default python benchmarks/run_graph_retrieval.py
          BRAINCORE_TENANT=default python benchmarks/run_event_timeline.py
          BRAINCORE_TENANT=default python benchmarks/run_ops_memory_bench.py
          python benchmarks/verify_claims_to_evidence.py --readme README.md --claims benchmarks/claims-to-evidence.yaml

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          for artifact in \
            benchmarks/results/2026-04-09-retrieval-production.json \
            benchmarks/results/2026-04-09-grounding-production.json \
            benchmarks/results/2026-04-26-retrieval-vector-production.json \
            benchmarks/results/2026-04-26-graph-retrieval.json \
            benchmarks/results/2026-04-26-event-timeline.json \
            benchmarks/results/2026-04-26-ops-memory-bench.json \
            benchmarks/README.md \
            CHANGELOG.md
          do
            test -s "$artifact"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          name: ${{ github.ref_name }}
          body: |
            BrainCore ${{ github.ref_name }}.

            Release artifacts:
            - Production-corpus facts, latency, and grounding metrics
            - Vector-stream smoke artifact
            - Graph, event-timeline, and ops-memory regression artifacts
            - Benchmark README and reproducibility notes
            - Changelog

            This release does not publish a Docker image or GHCR package.
          files: |
            benchmarks/results/2026-04-09-retrieval-production.json
            benchmarks/results/2026-04-09-grounding-production.json
            benchmarks/results/2026-04-26-retrieval-vector-production.json
            benchmarks/results/2026-04-26-graph-retrieval.json
            benchmarks/results/2026-04-26-event-timeline.json
            benchmarks/results/2026-04-26-ops-memory-bench.json
            benchmarks/README.md
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
