version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: braincore
      POSTGRES_PASSWORD: ${BRAINCORE_POSTGRES_PASSWORD:-change-me-local-only}
      POSTGRES_DB: braincore
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - braincore-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U braincore"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  braincore-data:
